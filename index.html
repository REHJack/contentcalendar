<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jack's Content Calendar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,'Segoe UI',system-ui,sans-serif;overflow-x:hidden;min-height:100vh}
.day-cell{transition:all .2s}.day-cell:hover{transform:scale(1.02);box-shadow:0 6px 20px var(--shadow)}
.entry{transition:all .15s}.entry:hover{transform:scale(1.03);box-shadow:0 3px 12px var(--shadow)}
.week-row:hover .week-bar{background:var(--wbar-hv)!important}.week-row:hover .week-bar span{color:#fff!important}
.mini-item:hover{background:var(--mini-hv)!important}
.nav-btn:hover{background:var(--btn-hv)!important}
.qa-btn{opacity:0;transition:opacity .15s}.day-cell:hover .qa-btn{opacity:1}
.import-btn:hover{opacity:.9!important}
.qnav-wrap{max-height:220px;overflow-y:auto;scrollbar-width:thin}
.qnav-wrap::-webkit-scrollbar{width:4px}.qnav-wrap::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
.glass{background:var(--glass-bg);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));border:1px solid var(--glass-bd);border-radius:var(--radius)}
.glass-strong{background:var(--glass-bg-s);backdrop-filter:blur(var(--blur-s));-webkit-backdrop-filter:blur(var(--blur-s));border:1px solid var(--glass-bd-s);border-radius:var(--radius)}
@media(max-width:768px){.desktop-only{display:none!important}.mobile-only{display:block!important}.main-wrap{flex-direction:column!important}.sidebar{width:100%!important}.cal-main{min-width:0!important}}
@media(min-width:769px){.mobile-only{display:none!important}.desktop-only{display:block!important}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
var MONTHS_S=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var DAYS_H=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var DAYS_SHORT=["M","T","W","T","F","S","S"];
var TYPES=["Blog","Optimisation","Audit","Uploading","Misc"];
var TYPE_ICO={Blog:"\ud83d\udcdd",Optimisation:"\u2699\ufe0f",Audit:"\ud83d\udd0d",Uploading:"\ud83d\udce4",Misc:"\ud83d\udccb"};
var STATUSES=["Scheduled","In Progress","Published","Meeting"];
var ST_ICO={Scheduled:"\ud83d\udcc5","In Progress":"\ud83d\udea7",Published:"\u2705",Meeting:"\ud83e\udd1d"};
var ST_ORDER={Meeting:0,Scheduled:1,"In Progress":2,Published:3};
var RECUR=["None","Weekly","Bi-weekly","Monthly"];
var EMOJIS=["\ud83d\udd25","\u2b50","\ud83d\udca1"];

var state={dark:false,yr:2026,mo:2,entries:{},search:"",filterSt:"All",filterType:"All",undoStack:[],ctx:null,drag:null,mobileWeek:0,importMsg:"",sidebarOpen:false,confirmDel:null};
function saveEntries(){try{localStorage.setItem("jcc_entries",JSON.stringify(state.entries))}catch(e){}}
function loadEntries(){try{var d=localStorage.getItem("jcc_entries");if(d)state.entries=JSON.parse(d)}catch(e){}}
function savePref(){try{localStorage.setItem("jcc_dark",state.dark?"1":"0")}catch(e){}}
function loadPref(){try{var d=localStorage.getItem("jcc_dark");if(d!==null)state.dark=d==="1"}catch(e){}}
loadEntries();loadPref();
var _now=new Date();state.yr=_now.getFullYear();state.mo=_now.getMonth();

function gid(){return Math.random().toString(36).slice(2,9)}
function fmtDate(d){return d.getDate()+" "+MONTHS_S[d.getMonth()]+" "+d.getFullYear()+" at "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")}
function dims(y,m){return new Date(y,m+1,0).getDate()}
function startD(y,m){var d=new Date(y,m,1).getDay();return d===0?6:d-1}
function dk(y,m,d){return y+"-"+m+"-"+d}
function ge(y,m,d){return state.entries[dk(y,m,d)]||[]}
function snap(){state.undoStack=state.undoStack.slice(-19).concat([JSON.parse(JSON.stringify(state.entries))])}
function undo(){if(!state.undoStack.length)return;state.entries=state.undoStack.pop();saveEntries();render()}

// Theme colors
var TYPE_L={Blog:{bg:"rgba(99,102,241,.15)",tx:"#4338ca",bd:"rgba(99,102,241,.12)"},Optimisation:{bg:"rgba(236,72,153,.12)",tx:"#be185d",bd:"rgba(236,72,153,.1)"},Audit:{bg:"rgba(245,158,11,.13)",tx:"#b45309",bd:"rgba(245,158,11,.1)"},Uploading:{bg:"rgba(16,185,129,.13)",tx:"#047857",bd:"rgba(16,185,129,.1)"},Misc:{bg:"rgba(107,114,128,.1)",tx:"#4b5563",bd:"rgba(107,114,128,.08)"}};
var TYPE_D={Blog:{bg:"rgba(129,140,248,.2)",tx:"#a5b4fc",bd:"rgba(129,140,248,.15)"},Optimisation:{bg:"rgba(244,114,182,.18)",tx:"#f9a8d4",bd:"rgba(244,114,182,.12)"},Audit:{bg:"rgba(251,191,36,.18)",tx:"#fcd34d",bd:"rgba(251,191,36,.12)"},Uploading:{bg:"rgba(52,211,153,.18)",tx:"#6ee7b7",bd:"rgba(52,211,153,.12)"},Misc:{bg:"rgba(156,163,175,.15)",tx:"#d1d5db",bd:"rgba(156,163,175,.1)"}};

function typeStyle(tp,dark){var c=dark?TYPE_D[tp]||TYPE_D.Misc:TYPE_L[tp]||TYPE_L.Misc;return"background:"+c.bg+";color:"+c.tx+";border:1px solid "+c.bd}
function stStyle(s,t){
  if(s==="Scheduled")return"background:"+t.scB+";color:"+t.scT+";border:1px solid "+t.scBd;
  if(s==="In Progress")return"background:"+t.ipB+";color:"+t.ipT+";border:1px solid "+t.ipBd;
  if(s==="Published")return"background:"+t.puB+";color:"+t.puT+";border:1px solid "+t.puBd;
  if(s==="Meeting")return"background:"+t.mtB+";color:"+t.mtT+";border:1px solid "+t.mtBd;
  return"";
}

function addEntryRaw(y,m,d,e){var k=dk(y,m,d);if(!e.createdAt)e.createdAt=new Date().toISOString();if(!e.history)e.history=[];if(!e.entryType)e.entryType="Misc";state.entries[k]=(state.entries[k]||[]).concat([e])}
function addEntry(y,m,d,e){snap();addEntryRaw(y,m,d,e);expandR(y,m,d,e);saveEntries();render()}
function expandR(y,m,d,e){
  if(e.recurrence==="None")return;var endDt=e.recurEnd?new Date(e.recurEnd+"T23:59:59"):null;
  var iv=e.recurrence==="Weekly"?7:e.recurrence==="Bi-weekly"?14:0;
  if(iv>0){var dt=new Date(y,m,d);for(var i=0;i<52;i++){dt=new Date(dt.getTime()+iv*864e5);if(endDt&&dt>endDt)break;addEntryRaw(dt.getFullYear(),dt.getMonth(),dt.getDate(),Object.assign({},e,{id:gid(),recurring:true}))}}
  else if(e.recurrence==="Monthly"){for(var i=1;i<=12;i++){var nm=m+i,ny=y;if(nm>11){nm-=12;ny++}var nd=Math.min(d,dims(ny,nm));var chk=new Date(ny,nm,nd);if(endDt&&chk>endDt)break;addEntryRaw(ny,nm,nd,Object.assign({},e,{id:gid(),recurring:true}))}}
}
function updateEntry(y,m,d,id,u){snap();var k=dk(y,m,d);state.entries[k]=(state.entries[k]||[]).map(function(e){
  if(e.id!==id)return e;var updated=Object.assign({},e,u);if(!updated.history)updated.history=[];var changes=[];
  if(u.status&&u.status!==e.status)changes.push("Status: "+e.status+" \u2192 "+u.status);
  if(u.entryType&&u.entryType!==e.entryType)changes.push("Type: "+(e.entryType||"Misc")+" \u2192 "+u.entryType);
  if(u.title&&u.title!==e.title)changes.push("Title updated");
  if(u.recurrence&&u.recurrence!==(e.recurrence||"None"))changes.push("Recurrence: "+(e.recurrence||"None")+" \u2192 "+u.recurrence);
  if(u.notes!==undefined&&u.notes!==(e.notes||""))changes.push("Notes updated");
  if(changes.length>0)updated.history=updated.history.concat([{date:new Date().toISOString(),changes:changes}]);
  updated.lastEdited=new Date().toISOString();return updated;
});saveEntries();render()}
function removeEntry(y,m,d,id){snap();var k=dk(y,m,d);state.entries[k]=(state.entries[k]||[]).filter(function(e){return e.id!==id});saveEntries();render()}
function moveEntry(fk,tk,id){if(fk===tk)return;snap();var e=null;state.entries[fk]=(state.entries[fk]||[]).filter(function(x){if(x.id===id){e=x;return false}return true});if(e)state.entries[tk]=(state.entries[tk]||[]).concat([e]);saveEntries();render()}
function toggleEmoji(y,m,d,id,em){var k=dk(y,m,d);state.entries[k]=(state.entries[k]||[]).map(function(e){if(e.id!==id)return e;var r=e.reactions||[];return Object.assign({},e,{reactions:r.indexOf(em)>=0?r.filter(function(x){return x!==em}):r.concat([em])})});saveEntries();render()}

function getTheme(){
  if(state.dark)return{
    bodyBg:"linear-gradient(145deg,#0f0f1a 0%,#1a1a2e 30%,#16213e 60%,#1a1a2e 100%)",
    glowA:"rgba(99,102,241,.2)",glowB:"rgba(168,85,247,.15)",glowC:"rgba(14,165,233,.12)",
    tx:"#e2e8f0",ts:"rgba(226,232,240,.4)",ac:"#818cf8",
    glassBg:"rgba(255,255,255,.06)",glassBd:"rgba(255,255,255,.1)",glassBgS:"rgba(255,255,255,.08)",glassBdS:"rgba(255,255,255,.12)",
    btnBg:"rgba(255,255,255,.08)",btnBd:"rgba(255,255,255,.12)",btnHv:"rgba(255,255,255,.14)",
    cellBg:"rgba(255,255,255,.03)",cellBd:"rgba(255,255,255,.06)",cellHv:"rgba(255,255,255,.08)",
    gridBd:"rgba(255,255,255,.06)",dhBg:"rgba(255,255,255,.04)",
    tB:"rgba(129,140,248,.8)",tT:"#fff",
    scB:"rgba(14,165,233,.18)",scT:"#7dd3fc",scBd:"rgba(14,165,233,.12)",
    ipB:"rgba(251,191,36,.18)",ipT:"#fcd34d",ipBd:"rgba(251,191,36,.12)",
    puB:"rgba(52,211,153,.18)",puT:"#6ee7b7",puBd:"rgba(52,211,153,.12)",
    mtB:"rgba(168,85,247,.18)",mtT:"#c4b5fd",mtBd:"rgba(168,85,247,.12)",
    sh:"rgba(0,0,0,.3)",wkBg:"rgba(255,255,255,.04)",wkHv:"rgba(129,140,248,.7)",
    ctxBg:"rgba(30,32,48,.95)",ctxBd:"rgba(255,255,255,.12)",ctxHv:"rgba(255,255,255,.08)",
    modalBg:"rgba(20,22,36,.96)",inputBg:"rgba(255,255,255,.06)",inputBd:"rgba(255,255,255,.1)",
    miniHv:"rgba(255,255,255,.08)",todayCell:"rgba(129,140,248,.12)",
    hm:["transparent","rgba(129,140,248,.06)","rgba(129,140,248,.12)","rgba(129,140,248,.2)","rgba(129,140,248,.3)"],
    blur:"20px",blurS:"24px",radius:"16px"
  };
  return{
    bodyBg:"linear-gradient(145deg,#dce4ff 0%,#e8d5f5 20%,#fce4ec 40%,#fff3e0 60%,#e0f2f1 80%,#d1e8ff 100%)",
    glowA:"rgba(99,102,241,.25)",glowB:"rgba(236,72,153,.15)",glowC:"rgba(52,211,153,.15)",
    tx:"#1e1b4b",ts:"rgba(30,27,75,.4)",ac:"#6366f1",
    glassBg:"rgba(255,255,255,.4)",glassBd:"rgba(255,255,255,.55)",glassBgS:"rgba(255,255,255,.5)",glassBdS:"rgba(255,255,255,.6)",
    btnBg:"rgba(255,255,255,.45)",btnBd:"rgba(255,255,255,.55)",btnHv:"rgba(255,255,255,.6)",
    cellBg:"rgba(255,255,255,.15)",cellBd:"rgba(255,255,255,.25)",cellHv:"rgba(255,255,255,.35)",
    gridBd:"rgba(255,255,255,.25)",dhBg:"rgba(255,255,255,.25)",
    tB:"rgba(99,102,241,.8)",tT:"#fff",
    scB:"rgba(14,165,233,.13)",scT:"#0369a1",scBd:"rgba(14,165,233,.1)",
    ipB:"rgba(245,158,11,.13)",ipT:"#b45309",ipBd:"rgba(245,158,11,.1)",
    puB:"rgba(16,185,129,.13)",puT:"#047857",puBd:"rgba(16,185,129,.1)",
    mtB:"rgba(168,85,247,.12)",mtT:"#7c3aed",mtBd:"rgba(168,85,247,.1)",
    sh:"rgba(0,0,0,.06)",wkBg:"rgba(255,255,255,.25)",wkHv:"rgba(99,102,241,.75)",
    ctxBg:"rgba(255,255,255,.85)",ctxBd:"rgba(255,255,255,.7)",ctxHv:"rgba(255,255,255,.5)",
    modalBg:"rgba(255,255,255,.88)",inputBg:"rgba(255,255,255,.5)",inputBd:"rgba(255,255,255,.6)",
    miniHv:"rgba(255,255,255,.4)",todayCell:"rgba(99,102,241,.1)",
    hm:["transparent","rgba(99,102,241,.05)","rgba(99,102,241,.1)","rgba(99,102,241,.18)","rgba(99,102,241,.28)"],
    blur:"20px",blurS:"24px",radius:"16px"
  };
}
function hmBg(c,t){return t.hm[Math.min(c,4)]}
function countByStatus(din){var c={};STATUSES.forEach(function(s){c[s]=0});for(var d=1;d<=din;d++)ge(state.yr,state.mo,d).forEach(function(e){if(c[e.status]!==undefined)c[e.status]++});return c}
function countByType(din){var c={};TYPES.forEach(function(tp){c[tp]=0});for(var d=1;d<=din;d++)ge(state.yr,state.mo,d).forEach(function(e){var tp=e.entryType||"Misc";if(c[tp]!==undefined)c[tp]++});return c}
function filE(y,m,d){var e=ge(y,m,d);if(state.filterSt!=="All")e=e.filter(function(x){return x.status===state.filterSt});if(state.filterType!=="All")e=e.filter(function(x){return(x.entryType||"Misc")===state.filterType});if(state.search)e=e.filter(function(x){return x.title.toLowerCase().indexOf(state.search.toLowerCase())>=0});return e}
function getWeeks(){var din=dims(state.yr,state.mo),stDy=startD(state.yr,state.mo),weeks=[],wk=[];for(var i=0;i<stDy;i++)wk.push(0);for(var d=1;d<=din;d++){wk.push(d);if(wk.length===7){weeks.push(wk);wk=[]}}if(wk.length){while(wk.length<7)wk.push(0);weeks.push(wk)}return weeks}
function isMobile(){return window.innerWidth<=768}

function buildSidebarContent(t,din){
  var o="",cts=countByStatus(din),ctt=countByType(din);
  o+='<div class="glass" style="padding:14px;margin-bottom:10px">';
  o+='<div style="font-size:10px;font-weight:600;color:'+t.ts+';margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Quick Nav</div>';
  o+='<div class="qnav-wrap" id="qnavScroll">';
  for(var i=-3;i<=12;i++){var mm=state.mo+i,yy=state.yr;while(mm<0){mm+=12;yy--}while(mm>11){mm-=12;yy++}
    var act=mm===state.mo&&yy===state.yr,mDin=dims(yy,mm),mCt=0;
    for(var dd=1;dd<=mDin;dd++)mCt+=(state.entries[dk(yy,mm,dd)]||[]).length;
    o+='<div class="mini-item" data-qnav="'+(act?"active":"")+'" onclick="goMonth('+mm+","+yy+')" style="padding:5px 10px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:'+(act?700:400)+";background:"+(act?t.ac:"transparent")+";color:"+(act?"#fff":t.tx)+';display:flex;justify-content:space-between;align-items:center;transition:all .15s">';
    o+='<span>'+MONTHS_S[mm]+" "+yy+"</span>";
    if(mCt>0)o+='<span style="font-size:9px;font-weight:700;background:'+(act?"rgba(255,255,255,.25)":"rgba(99,102,241,.1)")+";padding:1px 5px;border-radius:6px;color:"+(act?"#fff":t.ts)+'">'+mCt+"</span>";
    o+="</div>";}
  o+="</div></div>";
  o+='<div class="glass" style="padding:12px;margin-bottom:10px">';
  o+='<div style="font-size:10px;font-weight:600;color:'+t.ts+';margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Entry Types</div>';
  TYPES.forEach(function(tp){var c=state.dark?TYPE_D[tp]:TYPE_L[tp];
    o+='<div style="margin-bottom:3px;display:flex;align-items:center;justify-content:space-between"><span style="'+typeStyle(tp,state.dark)+';padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;backdrop-filter:blur(8px)">'+TYPE_ICO[tp]+" "+tp+'</span><span style="font-size:10px;font-weight:700;color:'+t.ts+'">'+ctt[tp]+"</span></div>"});
  o+="</div>";
  o+='<div class="glass" style="padding:12px">';
  o+='<div style="font-size:10px;font-weight:600;color:'+t.ts+';margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Statuses</div>';
  STATUSES.forEach(function(s){o+='<div style="margin-bottom:3px;display:flex;align-items:center;justify-content:space-between"><span style="'+stStyle(s,t)+';padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;backdrop-filter:blur(8px)">'+ST_ICO[s]+" "+s+'</span><span style="font-size:10px;font-weight:700;color:'+t.ts+'">'+cts[s]+"</span></div>"});
  o+='<div style="border-top:1px solid '+t.glassBd+';margin-top:6px;padding-top:6px"><div style="font-size:10px;color:'+t.ts+';margin-bottom:3px">Reactions</div>';
  EMOJIS.forEach(function(e){o+='<span style="margin-right:5px;font-size:13px">'+e+"</span>"});
  o+="</div></div>";
  return o;
}

function renderEntry(en,d,t){
  var du=Math.ceil((new Date(state.yr,state.mo,d)-new Date())/864e5);
  var cdBadge=en.status==="Scheduled"&&du>=0&&du<=7;
  var dayK=dk(state.yr,state.mo,d),tp=en.entryType||"Misc";
  var h='<div class="entry" draggable="true" ondragstart="startDrag(\''+en.id+"','"+dayK+'\')" ondragend="endDrag()" oncontextmenu="showCtxEntry(event,'+d+",'"+en.id+'\')" title="'+(en.notes||en.title).replace(/"/g,"&quot;")+'" style="'+typeStyle(tp,state.dark)+';padding:3px 6px;border-radius:8px;font-size:10px;font-weight:600;margin-bottom:2px;cursor:grab;display:flex;align-items:center;gap:3px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)">';
  h+='<span style="flex-shrink:0;font-size:10px">'+TYPE_ICO[tp]+"</span>";
  h+='<span style="flex-shrink:0;font-size:9px">'+ST_ICO[en.status]+"</span>";
  h+='<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1">'+en.title+"</span>";
  if(en.recurring)h+='<span style="font-size:8px;flex-shrink:0">\ud83d\udd01</span>';
  if((en.reactions||[]).length>0)h+='<span style="font-size:8px;flex-shrink:0">'+(en.reactions||[]).join("")+"</span>";
  if(cdBadge)h+='<span style="font-size:7px;flex-shrink:0;background:rgba(0,0,0,.1);border-radius:4px;padding:0 3px">'+(du===0?"today":du===1?"tmrw":du+"d")+"</span>";
  h+="</div>";return h;
}

function render(){
  var t=getTheme(),root=document.documentElement;
  root.style.setProperty("--accent",t.ac);root.style.setProperty("--shadow",t.sh);root.style.setProperty("--hover",t.cellHv);
  root.style.setProperty("--surf-alt",t.glassBg);root.style.setProperty("--ctx-hv",t.ctxHv);root.style.setProperty("--mini-hv",t.miniHv);
  root.style.setProperty("--btn-hv",t.btnHv);root.style.setProperty("--wbar-hv",t.wkHv);
  root.style.setProperty("--glass-bg",t.glassBg);root.style.setProperty("--glass-bd",t.glassBd);
  root.style.setProperty("--glass-bg-s",t.glassBgS);root.style.setProperty("--glass-bd-s",t.glassBdS);
  root.style.setProperty("--blur",t.blur);root.style.setProperty("--blur-s",t.blurS);root.style.setProperty("--radius",t.radius);

  var din=dims(state.yr,state.mo),today=new Date();
  var isT=function(d){return today.getFullYear()===state.yr&&today.getMonth()===state.mo&&today.getDate()===d};
  var weeks=getWeeks();if(state.mobileWeek>=weeks.length)state.mobileWeek=weeks.length-1;
  var cts=countByStatus(din),ctt=countByType(din),totalEntries=0;STATUSES.forEach(function(s){totalEntries+=cts[s]});
  var weekCts=weeks.map(function(w){return w.reduce(function(s,d){return s+(d?filE(state.yr,state.mo,d).length:0)},0)});

  // Background with glowing orbs
  var o='<div style="min-height:100vh;background:'+t.bodyBg+';color:'+t.tx+';font-family:Inter,-apple-system,Segoe UI,system-ui,sans-serif;position:relative;overflow:hidden">';
  o+='<div style="position:fixed;width:400px;height:400px;background:radial-gradient(circle,'+t.glowA+',transparent 65%);top:-100px;right:-80px;border-radius:50%;pointer-events:none"></div>';
  o+='<div style="position:fixed;width:350px;height:350px;background:radial-gradient(circle,'+t.glowB+',transparent 65%);bottom:-80px;left:-60px;border-radius:50%;pointer-events:none"></div>';
  o+='<div style="position:fixed;width:250px;height:250px;background:radial-gradient(circle,'+t.glowC+',transparent 65%);top:40%;left:35%;border-radius:50%;pointer-events:none"></div>';
  o+='<div style="position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:16px">';

  // Header
  o+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">';
  o+='<div><h1 style="margin:0;font-size:clamp(20px,5vw,26px);font-weight:800;color:'+t.tx+';letter-spacing:-0.5px">Jack\'s Content Calendar</h1>';
  o+='<p class="desktop-only" style="margin:2px 0 0;font-size:12px;color:'+t.ts+'">Right-click any day or entry \u2022 Drag to reschedule \u2022 + quick-add</p></div>';
  o+='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">';

  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="margin:0;color:'+t.tx+';font-size:17px">\ud83d\udcc5 '+MONTHS[state.mo]+" "+day+", "+state.yr+'</h3><span style="font-size:12px;font-weight:600;color:'+t.ts+'">'+allE.length+(allE.length===1?" entry":" entries")+"</span></div>";
  if(!allE.length)html+='<div style="text-align:center;padding:30px 0;color:'+t.ts+'"><div style="font-size:36px;margin-bottom:8px">\ud83d\udcad</div><p>No entries</p></div>';
  else allE.forEach(function(en){
    var tp=en.entryType||"Misc";
    html+='<div style="background:'+t.inputBg+";border:1px solid "+t.inputBd+';border-radius:14px;padding:12px;margin-bottom:8px;backdrop-filter:blur(10px)">';
    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span style="font-size:14px;font-weight:700;color:'+t.tx+'">'+en.title+"</span>";
    html+='<div style="display:flex;gap:4px">';
    if(en.recurring)html+='<span style="font-size:11px">\ud83d\udd01</span>';
    if((en.reactions||[]).length>0)html+='<span style="font-size:11px">'+(en.reactions||[]).join("")+"</span>";
    html+="</div></div>";
    html+='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:'+(en.notes?"6":"0")+'px">';
    html+='<span style="'+typeStyle(tp,state.dark)+';padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600">'+TYPE_ICO[tp]+" "+tp+"</span>";
    html+='<span style="'+stStyle(en.status,t)+';padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600">'+ST_ICO[en.status]+" "+en.status+"</span>";
    if(en.recurrence&&en.recurrence!=="None")html+='<span style="font-size:10px;color:'+t.ts+";background:"+t.inputBg+";padding:2px 6px;border-radius:6px;border:1px solid "+t.inputBd+'">'+en.recurrence+(en.recurEnd?" until "+en.recurEnd:"")+"</span>";
    html+="</div>";
    if(en.notes)html+='<p style="margin:0 0 4px;font-size:12px;color:'+t.ts+';line-height:1.5;white-space:pre-wrap">'+en.notes+"</p>";
    var tsH="";
    if(en.createdAt)tsH+='<div style="font-size:10px;color:'+t.ts+'">Created: '+fmtDate(new Date(en.createdAt))+"</div>";
    if(en.lastEdited)tsH+='<div style="font-size:10px;color:'+t.ts+'">Last edited: '+fmtDate(new Date(en.lastEdited))+"</div>";
    if((en.history||[]).length>0){tsH+='<div style="margin-top:4px">';en.history.slice(-5).reverse().forEach(function(h){tsH+='<div style="font-size:10px;color:'+t.ts+';padding:2px 0"><span style="color:'+t.ac+';font-weight:600">'+fmtDate(new Date(h.date))+"</span> \u2014 "+h.changes.join(", ")+"</div>"});tsH+="</div>";}
    if(tsH)html+='<div style="margin-top:6px;padding-top:6px;border-top:1px solid '+t.glassBd+'">'+tsH+"</div>";
    html+='<div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end">';
    html+='<button onclick="hideModal();triggerEdit('+day+",'"+en.id+"')\" style=\"padding:4px 10px;border-radius:8px;border:1px solid "+t.btnBd+";background:"+t.btnBg+";color:"+t.ts+';cursor:pointer;font-size:11px;backdrop-filter:blur(8px)">\u270f\ufe0f Edit</button>';
    html+="<button onclick=\"hideModal();triggerDel("+state.yr+","+state.mo+","+day+",'"+en.id+"','"+en.title.replace(/'/g,"\\'").replace(/"/g,"")+"')\" style=\"padding:4px 10px;border-radius:8px;border:1px solid "+t.btnBd+";background:"+t.btnBg+";color:#ef4444;cursor:pointer;font-size:11px;backdrop-filter:blur(8px)\">\ud83d\uddd1\ufe0f Remove</button>";
    html+="</div></div>";
  });
  html+='<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">';
  html+='<button onclick="hideModal();openModal(\'new\','+day+')" style="padding:9px 18px;border-radius:12px;border:none;background:rgba(16,185,129,.8);color:#fff;cursor:pointer;font-size:13px;font-weight:600">\u2795 Add</button>';
  html+='<button id="dd_close" style="padding:9px 18px;border-radius:12px;border:none;background:'+t.ac+';color:#fff;cursor:pointer;font-size:13px;font-weight:600">Close</button></div>';
  b.innerHTML=html;document.body.appendChild(modOv);
  document.getElementById("dd_close").onclick=hideModal;
};

window.triggerDel=function(yr,mo,day,id,title){state.confirmDel={yr:yr,mo:mo,day:day,id:id,title:title};render()};
window.triggerEdit=function(day,id){var k=dk(state.yr,state.mo,day);var en=(state.entries[k]||[]).filter(function(x){return x.id===id})[0];if(en)openModalEdit(day,en)};

// Bulk Add
window.openBulkAdd=function(){
  var m=makeModal(),t=m.t,b=m.box;b.style.maxWidth="440px";
  b.innerHTML='<h3 style="margin:0 0 6px;color:'+t.tx+';font-size:17px">\ud83d\udccb Bulk Add</h3><p style="margin:0 0 14px;font-size:12px;color:'+t.ts+'">One task per line.</p>'
    +'<textarea id="ba_titles" placeholder="Blog: Client A review\nAudit: Client A technical\nOptimisation: Landing pages" rows="6" style="'+inputCSS(t)+';margin-bottom:10px;resize:vertical;font-family:inherit"></textarea>'
    +'<div style="display:flex;gap:10px;margin-bottom:10px"><div style="flex:1"><label style="font-size:11px;color:'+t.ts+';display:block;margin-bottom:3px">Day</label><select id="ba_day" style="'+selectCSS(t)+'">'+Array.from({length:dims(state.yr,state.mo)},function(_,i){return'<option value="'+(i+1)+'">'+(i+1)+"</option>"}).join("")+'</select></div><div style="flex:1"><label style="font-size:11px;color:'+t.ts+';display:block;margin-bottom:3px">Type</label><select id="ba_tp" style="'+selectCSS(t)+'">'+TYPES.map(function(tp){return'<option value="'+tp+'">'+TYPE_ICO[tp]+" "+tp+"</option>"}).join("")+"</select></div></div>"
    +'<div style="display:flex;gap:10px;margin-bottom:10px"><div style="flex:1"><label style="font-size:11px;color:'+t.ts+';display:block;margin-bottom:3px">Status</label><select id="ba_st" style="'+selectCSS(t)+'">'+STATUSES.map(function(s){return'<option value="'+s+'">'+ST_ICO[s]+" "+s+"</option>"}).join("")+'</select></div><div style="flex:1"><label style="font-size:11px;color:'+t.ts+';display:block;margin-bottom:3px">Recurrence</label><select id="ba_rc" onchange="toggleBaEnd()" style="'+selectCSS(t)+'">'+RECUR.map(function(r){return'<option value="'+r+'">'+r+"</option>"}).join("")+"</select></div></div>"
    +'<div id="ba_end_wrap" style="margin-bottom:10px;display:none"><label style="font-size:11px;color:'+t.ts+';display:block;margin-bottom:3px">End Date</label><input id="ba_re" type="date" style="'+selectCSS(t)+';box-sizing:border-box"/></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end"><button id="ba_cn" style="padding:9px 18px;border-radius:12px;border:1px solid '+t.btnBd+";background:"+t.btnBg+";color:"+t.ts+';cursor:pointer;font-size:14px">Cancel</button><button id="ba_sv" style="padding:9px 18px;border-radius:12px;border:none;background:rgba(16,185,129,.8);color:#fff;cursor:pointer;font-size:14px;font-weight:600">Add All</button></div>';
  document.body.appendChild(modOv);
  document.getElementById("ba_cn").onclick=hideModal;
  document.getElementById("ba_sv").onclick=function(){
    var lines=document.getElementById("ba_titles").value.split("\n").map(function(l){return l.trim()}).filter(function(l){return l.length>0});
    if(!lines.length)return;var day=parseInt(document.getElementById("ba_day").value),tp=document.getElementById("ba_tp").value,st=document.getElementById("ba_st").value,rc=document.getElementById("ba_rc").value,re=document.getElementById("ba_re")?document.getElementById("ba_re").value||"":"";
    snap();lines.forEach(function(title){var e={id:gid(),title:title,notes:"",entryType:tp,status:st,recurrence:rc,recurEnd:re,reactions:[]};addEntryRaw(state.yr,state.mo,day,e);expandR(state.yr,state.mo,day,e)});
    saveEntries();state.importMsg="\u2705 Added "+lines.length+" entries";hideModal();render();setTimeout(function(){state.importMsg="";render()},4000);};
};
window.toggleBaEnd=function(){var rc=document.getElementById("ba_rc").value;var w=document.getElementById("ba_end_wrap");if(w)w.style.display=rc==="None"?"none":"block"};

// Weekly Brief
window.openWeeklyBrief=function(){
  var m=makeModal(),t=m.t,b=m.box;b.style.maxWidth="440px";
  var today=new Date(),todayDay=today.getDay(),mondayOff=todayDay===0?-6:1-todayDay;
  var monday=new Date(today);monday.setDate(today.getDate()+mondayOff);
  var weekEntries=[];
  for(var i=0;i<7;i++){var d=new Date(monday);d.setDate(monday.getDate()+i);var ents=ge(d.getFullYear(),d.getMonth(),d.getDate());ents.forEach(function(en){weekEntries.push({entry:en,dayName:DAYS_H[i],dayNum:d.getDate(),month:MONTHS_S[d.getMonth()],daysAway:i})})}
  weekEntries.sort(function(a,b){if(a.daysAway!==b.daysAway)return a.daysAway-b.daysAway;return(ST_ORDER[a.entry.status]||9)-(ST_ORDER[b.entry.status]||9)});
  var urgent=weekEntries.filter(function(e){return e.daysAway<=1}),upcoming=weekEntries.filter(function(e){return e.daysAway>1});
  var html='<h3 style="margin:0 0 4px;color:'+t.tx+';font-size:17px">\ud83d\udcca Weekly Brief</h3><p style="margin:0 0 16px;font-size:12px;color:'+t.ts+'">Week of '+monday.getDate()+" "+MONTHS_S[monday.getMonth()]+" \u2022 "+weekEntries.length+" entries</p>";
  if(!weekEntries.length)html+='<div style="text-align:center;padding:30px 0;color:'+t.ts+'"><div style="font-size:40px;margin-bottom:10px">\ud83c\udf89</div><p>Nothing this week!</p></div>';
  else{
    if(urgent.length>0){
      html+='<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);border-radius:14px;padding:12px;margin-bottom:12px;backdrop-filter:blur(10px)">';
      html+='<div style="font-size:12px;font-weight:700;color:rgba(239,68,68,.8);margin-bottom:8px">\ud83d\udd25 PRIORITY ('+urgent.length+")</div>";
      urgent.forEach(function(e){var tp=e.entry.entryType||"Misc";
        html+='<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.04)"><span style="font-size:11px">'+TYPE_ICO[tp]+'</span><span style="'+stStyle(e.entry.status,t)+';padding:1px 5px;border-radius:6px;font-size:9px;font-weight:600">'+ST_ICO[e.entry.status]+'</span><span style="font-size:12px;font-weight:600;color:'+t.tx+';flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e.entry.title+'</span><span style="font-size:10px;color:'+t.ts+'">'+e.dayName+"</span></div>"});
      html+="</div>";}
    if(upcoming.length>0){
      html+='<div style="background:'+t.inputBg+";border:1px solid "+t.inputBd+';border-radius:14px;padding:12px;backdrop-filter:blur(10px)">';
      html+='<div style="font-size:12px;font-weight:700;color:'+t.ac+';margin-bottom:8px">\ud83d\udcc5 LATER THIS WEEK ('+upcoming.length+")</div>";
      upcoming.forEach(function(e){var tp=e.entry.entryType||"Misc";
        html+='<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.04)"><span style="font-size:11px">'+TYPE_ICO[tp]+'</span><span style="'+stStyle(e.entry.status,t)+';padding:1px 5px;border-radius:6px;font-size:9px;font-weight:600">'+ST_ICO[e.entry.status]+'</span><span style="font-size:12px;font-weight:600;color:'+t.tx+';flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e.entry.title+'</span><span style="font-size:10px;color:'+t.ts+'">'+e.dayName+"</span></div>"});
      html+="</div>";}}
  html+='<div style="display:flex;justify-content:flex-end;margin-top:14px"><button id="wb_close" style="padding:9px 20px;border-radius:12px;border:none;background:'+t.ac+';color:#fff;cursor:pointer;font-size:14px;font-weight:600">Close</button></div>';
  b.innerHTML=html;document.body.appendChild(modOv);
  document.getElementById("wb_close").onclick=hideModal;
};

// Drag
function startDrag(id,fk){state.drag={id:id,fk:fk}}
function endDrag(){state.drag=null}
function doDrop(y,m,d){if(state.drag){moveEntry(state.drag.fk,dk(y,m,d),state.drag.id);state.drag=null}}

// Touch swipe
var touchX=0;
document.addEventListener("touchstart",function(e){touchX=e.touches[0].clientX},{passive:true});
document.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-touchX;if(Math.abs(dx)>60&&isMobile()){if(dx<0)nextWeek();else prevWeek()}},{passive:true});

// Delete confirm
window.confirmDel=function(){if(state.confirmDel){var cd=state.confirmDel;state.confirmDel=null;removeEntry(cd.yr,cd.mo,cd.day,cd.id)}};
window.cancelDel=function(){state.confirmDel=null;render()};

// Navigation
window.toggleSidebar=function(){state.sidebarOpen=!state.sidebarOpen;render()};
window.doUndo=function(){undo()};
window.toggleDark=function(){state.dark=!state.dark;savePref();render()};
window.goToday=function(){var d=new Date();state.yr=d.getFullYear();state.mo=d.getMonth();state.mobileWeek=0;var weeks=getWeeks();for(var i=0;i<weeks.length;i++){if(weeks[i].indexOf(d.getDate())>=0){state.mobileWeek=i;break}}render()};
window.prevMo=function(){if(state.mo===0){state.mo=11;state.yr--}else state.mo--;state.mobileWeek=0;render()};
window.nextMo=function(){if(state.mo===11){state.mo=0;state.yr++}else state.mo++;state.mobileWeek=0;render()};
window.goMonth=function(m,y){state.mo=m;state.yr=y;state.mobileWeek=0;state.sidebarOpen=false;render()};
window.goWeek=function(i){state.mobileWeek=i;render()};
window.prevWeek=function(){if(state.mobileWeek>0){state.mobileWeek--;render()}};
window.nextWeek=function(){var w=getWeeks();if(state.mobileWeek<w.length-1){state.mobileWeek++;render()}};
window.doSearch=function(v){state.search=v;render();var el=document.getElementById("searchBox");if(el){el.focus();el.setSelectionRange(v.length,v.length)}};
window.setFilter=function(v){state.filterSt=v;render()};
window.setFilterType=function(v){state.filterType=v;render()};
window.showCtx=showCtx;window.showCtxEntry=showCtxEntry;
window.openModal=openModal;window.hideModal=hideModal;window.openModalEdit=openModalEdit;
window.startDrag=startDrag;window.endDrag=endDrag;window.doDrop=doDrop;
window.addEventListener("resize",render);
render();
})();
</script>
</body>
</html>
