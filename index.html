<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jack's Content Calendar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;overflow-x:hidden}
.day-cell{transition:all .15s}.day-cell:hover{transform:scale(1.02);box-shadow:0 4px 14px var(--shadow)}
.entry{transition:all .15s}.entry:hover{transform:scale(1.03);box-shadow:0 2px 8px var(--shadow)}
.week-row:hover .week-bar{background:var(--accent)!important}.week-row:hover .week-bar span{color:#fff!important}
.mini-item:hover{background:var(--mini-hv)!important}
.nav-btn:hover{background:var(--hover)!important}
.qa-btn{opacity:0;transition:opacity .15s}.day-cell:hover .qa-btn{opacity:1}
.import-btn:hover{opacity:.9!important}
.qnav-wrap{max-height:220px;overflow-y:auto;scrollbar-width:thin}
.qnav-wrap::-webkit-scrollbar{width:4px}.qnav-wrap::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
@media(max-width:768px){.desktop-only{display:none!important}.mobile-only{display:block!important}.main-wrap{flex-direction:column!important}.sidebar{width:100%!important}.cal-main{min-width:0!important}}
@media(min-width:769px){.mobile-only{display:none!important}.desktop-only{display:block!important}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
var MONTHS_S=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var DAYS_H=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var DAYS_SHORT=["M","T","W","T","F","S","S"];

// ENTRY TYPES (what the work is)
var TYPES=["Blog","Optimisation","Audit","Uploading","Misc"];
var TYPE_ICO={Blog:"\ud83d\udcdd",Optimisation:"\u2699\ufe0f",Audit:"\ud83d\udd0d",Uploading:"\ud83d\udce4",Misc:"\ud83d\udccb"};
var TYPE_CLR_L={Blog:"#dbeafe",Optimisation:"#fce7f3",Audit:"#fef3c7",Uploading:"#d1fae5",Misc:"#f3f4f6"};
var TYPE_CLR_LT={Blog:"#1e40af",Optimisation:"#9d174d",Audit:"#92400e",Uploading:"#065f46",Misc:"#374151"};
var TYPE_CLR_D={Blog:"#1e3a5f",Optimisation:"#4a1942",Audit:"#422006",Uploading:"#064e3b",Misc:"#1f2937"};
var TYPE_CLR_DT={Blog:"#93c5fd",Optimisation:"#f0abfc",Audit:"#fcd34d",Uploading:"#6ee7b7",Misc:"#9ca3af"};

// STATUSES (where it's at)
var STATUSES=["Scheduled","In Progress","Published","Meeting"];
var ST_ICO={Scheduled:"\ud83d\udcc5","In Progress":"\ud83d\udea7",Published:"\u2705",Meeting:"\ud83e\udd1d"};
var ST_ORDER={Meeting:0,Scheduled:1,"In Progress":2,Published:3};

var RECUR=["None","Weekly","Bi-weekly","Monthly"];
var EMOJIS=["\ud83d\udd25","\u2b50","\ud83d\udca1"];

var state={dark:false,yr:2026,mo:2,entries:{},search:"",filterSt:"All",filterType:"All",undoStack:[],ctx:null,drag:null,mobileWeek:0,importMsg:"",sidebarOpen:false,confirmDel:null};

function gid(){return Math.random().toString(36).slice(2,9)}
function fmtDate(d){return d.getDate()+" "+MONTHS_S[d.getMonth()]+" "+d.getFullYear()+" at "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")}
function dims(y,m){return new Date(y,m+1,0).getDate()}
function startD(y,m){var d=new Date(y,m,1).getDay();return d===0?6:d-1}
function dk(y,m,d){return y+"-"+m+"-"+d}
function ge(y,m,d){return state.entries[dk(y,m,d)]||[]}
function snap(){state.undoStack=state.undoStack.slice(-19).concat([JSON.parse(JSON.stringify(state.entries))])}
function undo(){if(!state.undoStack.length)return;state.entries=state.undoStack.pop();render()}

function typeBg(tp,dark){return dark?TYPE_CLR_D[tp]||TYPE_CLR_D.Misc:TYPE_CLR_L[tp]||TYPE_CLR_L.Misc}
function typeTx(tp,dark){return dark?TYPE_CLR_DT[tp]||TYPE_CLR_DT.Misc:TYPE_CLR_LT[tp]||TYPE_CLR_LT.Misc}
function stBadgeStyle(s,t){
  if(s==="Scheduled")return"background:"+t.scB+";color:"+t.scT;
  if(s==="In Progress")return"background:"+t.ipB+";color:"+t.ipT;
  if(s==="Published")return"background:"+t.puB+";color:"+t.puT;
  if(s==="Meeting")return"background:"+t.mtB+";color:"+t.mtT;
  return"background:"+t.sa+";color:"+t.ts;
}

function addEntryRaw(y,m,d,e){var k=dk(y,m,d);if(!e.createdAt)e.createdAt=new Date().toISOString();if(!e.history)e.history=[];if(!e.entryType)e.entryType="Misc";state.entries[k]=(state.entries[k]||[]).concat([e])}
function addEntry(y,m,d,e){snap();addEntryRaw(y,m,d,e);expandR(y,m,d,e);render()}
function expandR(y,m,d,e){
  if(e.recurrence==="None")return;
  var endDt=e.recurEnd?new Date(e.recurEnd+"T23:59:59"):null;
  var iv=e.recurrence==="Weekly"?7:e.recurrence==="Bi-weekly"?14:0;
  if(iv>0){var dt=new Date(y,m,d);for(var i=0;i<52;i++){dt=new Date(dt.getTime()+iv*864e5);if(endDt&&dt>endDt)break;addEntryRaw(dt.getFullYear(),dt.getMonth(),dt.getDate(),Object.assign({},e,{id:gid(),recurring:true}))}}
  else if(e.recurrence==="Monthly"){for(var i=1;i<=12;i++){var nm=m+i,ny=y;if(nm>11){nm-=12;ny++}var nd=Math.min(d,dims(ny,nm));var chk=new Date(ny,nm,nd);if(endDt&&chk>endDt)break;addEntryRaw(ny,nm,nd,Object.assign({},e,{id:gid(),recurring:true}))}}
}
function updateEntry(y,m,d,id,u){snap();var k=dk(y,m,d);state.entries[k]=(state.entries[k]||[]).map(function(e){
  if(e.id!==id)return e;
  var updated=Object.assign({},e,u);if(!updated.history)updated.history=[];
  var changes=[];
  if(u.status&&u.status!==e.status)changes.push("Status: "+e.status+" \u2192 "+u.status);
  if(u.entryType&&u.entryType!==e.entryType)changes.push("Type: "+(e.entryType||"Misc")+" \u2192 "+u.entryType);
  if(u.title&&u.title!==e.title)changes.push("Title updated");
  if(u.recurrence&&u.recurrence!==(e.recurrence||"None"))changes.push("Recurrence: "+(e.recurrence||"None")+" \u2192 "+u.recurrence);
  if(u.notes!==undefined&&u.notes!==(e.notes||""))changes.push("Notes updated");
  if(changes.length>0)updated.history=updated.history.concat([{date:new Date().toISOString(),changes:changes}]);
  updated.lastEdited=new Date().toISOString();
  return updated;
});render()}
function removeEntry(y,m,d,id){snap();var k=dk(y,m,d);state.entries[k]=(state.entries[k]||[]).filter(function(e){return e.id!==id});render()}
function moveEntry(fk,tk,id){if(fk===tk)return;snap();var e=null;state.entries[fk]=(state.entries[fk]||[]).filter(function(x){if(x.id===id){e=x;return false}return true});if(e)state.entries[tk]=(state.entries[tk]||[]).concat([e]);render()}
function toggleEmoji(y,m,d,id,em){var k=dk(y,m,d);state.entries[k]=(state.entries[k]||[]).map(function(e){if(e.id!==id)return e;var r=e.reactions||[];return Object.assign({},e,{reactions:r.indexOf(em)>=0?r.filter(function(x){return x!==em}):r.concat([em])})});render()}

function getTheme(){
  if(state.dark)return{bg:"#0f1117",sf:"#1a1d2e",sa:"#232738",tx:"#e2e8f0",ts:"#94a3b8",ac:"#818cf8",bd:"#2d3148",hv:"#262a40",
    scB:"#1e3a5f",scT:"#93c5fd",ipB:"#422006",ipT:"#fcd34d",puB:"#064e3b",puT:"#6ee7b7",mtB:"#4a1942",mtT:"#f0abfc",
    sh:"rgba(0,0,0,0.4)",ctB:"#1e2235",ctH:"#2d3148",ctD:"#3b4063",wk:"#312e81",tB:"#818cf8",tT:"#0f1117",mH:"#312e81",
    hm:["transparent","rgba(129,140,248,0.08)","rgba(129,140,248,0.18)","rgba(129,140,248,0.32)","rgba(129,140,248,0.5)"]};
  return{bg:"#f0f4ff",sf:"#ffffff",sa:"#f7f8fc",tx:"#1a1a2e",ts:"#6b7280",ac:"#6366f1",bd:"#e2e5f1",hv:"#eef2ff",
    scB:"#dbeafe",scT:"#1e40af",ipB:"#fef3c7",ipT:"#92400e",puB:"#d1fae5",puT:"#065f46",mtB:"#fce7f3",mtT:"#9d174d",
    sh:"rgba(99,102,241,0.12)",ctB:"#ffffff",ctH:"#f3f4f6",ctD:"#e5e7eb",wk:"#e0e7ff",tB:"#6366f1",tT:"#fff",mH:"#e0e7ff",
    hm:["transparent","rgba(99,102,241,0.08)","rgba(99,102,241,0.18)","rgba(99,102,241,0.32)","rgba(99,102,241,0.5)"]};
}
function hmBg(c,t){return t.hm[Math.min(c,4)]}

function countByStatus(din){var c={};STATUSES.forEach(function(s){c[s]=0});for(var d=1;d<=din;d++)ge(state.yr,state.mo,d).forEach(function(e){if(c[e.status]!==undefined)c[e.status]++});return c}
function countByType(din){var c={};TYPES.forEach(function(tp){c[tp]=0});for(var d=1;d<=din;d++)ge(state.yr,state.mo,d).forEach(function(e){var tp=e.entryType||"Misc";if(c[tp]!==undefined)c[tp]++});return c}

function filE(y,m,d){
  var e=ge(y,m,d);
  if(state.filterSt!=="All")e=e.filter(function(x){return x.status===state.filterSt});
  if(state.filterType!=="All")e=e.filter(function(x){return(x.entryType||"Misc")===state.filterType});
  if(state.search)e=e.filter(function(x){return x.title.toLowerCase().indexOf(state.search.toLowerCase())>=0});
  return e;
}
function getWeeks(){
  var din=dims(state.yr,state.mo),stDy=startD(state.yr,state.mo),weeks=[],wk=[];
  for(var i=0;i<stDy;i++)wk.push(0);
  for(var d=1;d<=din;d++){wk.push(d);if(wk.length===7){weeks.push(wk);wk=[]}}
  if(wk.length){while(wk.length<7)wk.push(0);weeks.push(wk)}return weeks;
}
function isMobile(){return window.innerWidth<=768}

function buildSidebarContent(t,din){
  var o="",cts=countByStatus(din),ctt=countByType(din);
  o+='<div style="background:'+t.sf+";border-radius:14px;padding:14px;border:1px solid "+t.bd+'">';
  o+='<div style="font-size:11px;font-weight:700;color:'+t.ts+';margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Quick Nav</div>';
  o+='<div class="qnav-wrap" id="qnavScroll">';
  for(var i=-3;i<=12;i++){var mm=state.mo+i,yy=state.yr;while(mm<0){mm+=12;yy--}while(mm>11){mm-=12;yy++}
    var act=mm===state.mo&&yy===state.yr,mDin=dims(yy,mm),mCt=0;
    for(var dd=1;dd<=mDin;dd++)mCt+=(state.entries[dk(yy,mm,dd)]||[]).length;
    o+='<div class="mini-item" data-qnav="'+(act?"active":"")+'" onclick="goMonth('+mm+","+yy+')" style="padding:6px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:'+(act?700:400)+";background:"+(act?t.ac:"transparent")+";color:"+(act?"#fff":t.tx)+';display:flex;justify-content:space-between;align-items:center">';
    o+='<span>'+MONTHS_S[mm]+" "+yy+"</span>";
    if(mCt>0)o+='<span style="font-size:9px;font-weight:700;background:'+(act?"rgba(255,255,255,.25)":t.sa)+";padding:1px 5px;border-radius:4px;color:"+(act?"#fff":t.ts)+'">'+mCt+"</span>";
    o+="</div>";}
  o+="</div></div>";
  // Legend - Entry Types
  o+='<div style="margin-top:12px;background:'+t.sf+";border-radius:14px;padding:12px;border:1px solid "+t.bd+'">';
  o+='<div style="font-size:11px;font-weight:700;color:'+t.ts+';margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Entry Types</div>';
  TYPES.forEach(function(tp){
    var bg=typeBg(tp,state.dark),tx=typeTx(tp,state.dark);
    o+='<div style="margin-bottom:4px;display:flex;align-items:center;justify-content:space-between"><span style="background:'+bg+";color:"+tx+';padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600">'+TYPE_ICO[tp]+" "+tp+'</span><span style="font-size:10px;font-weight:700;color:'+t.ts+";background:"+t.sa+';padding:1px 6px;border-radius:4px">'+ctt[tp]+"</span></div>"});
  o+="</div>";
  // Legend - Statuses
  o+='<div style="margin-top:12px;background:'+t.sf+";border-radius:14px;padding:12px;border:1px solid "+t.bd+'">';
  o+='<div style="font-size:11px;font-weight:700;color:'+t.ts+';margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Statuses</div>';
  STATUSES.forEach(function(s){o+='<div style="margin-bottom:4px;display:flex;align-items:center;justify-content:space-between"><span style="'+stBadgeStyle(s,t)+';padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600">'+ST_ICO[s]+" "+s+'</span><span style="font-size:10px;font-weight:700;color:'+t.ts+";background:"+t.sa+';padding:1px 6px;border-radius:4px">'+cts[s]+"</span></div>"});
  o+='<div style="border-top:1px solid '+t.bd+';margin-top:6px;padding-top:6px"><div style="font-size:10px;color:'+t.ts+';margin-bottom:3px">Reactions</div>';
  EMOJIS.forEach(function(e){o+='<span style="margin-right:5px;font-size:13px">'+e+"</span>"});
  o+="</div></div>";
  return o;
}

function renderEntry(en,d,t){
  var du=Math.ceil((new Date(state.yr,state.mo,d)-new Date())/864e5);
  var cdBadge=en.status==="Scheduled"&&du>=0&&du<=7;
  var dayK=dk(state.yr,state.mo,d);
  var tp=en.entryType||"Misc";
  var bg=typeBg(tp,state.dark),tx=typeTx(tp,state.dark);
  var h='<div class="entry" draggable="true" ondragstart="startDrag(\''+en.id+"','"+dayK+'\')" ondragend="endDrag()" oncontextmenu="showCtxEntry(event,'+d+",'"+en.id+'\')" title="'+(en.notes||en.title).replace(/"/g,"&quot;")+'" style="background:'+bg+";color:"+tx+';padding:4px 6px;border-radius:6px;font-size:10px;font-weight:600;margin-bottom:3px;cursor:grab;display:flex;align-items:center;gap:3px">';
  h+='<span style="flex-shrink:0;font-size:10px">'+TYPE_ICO[tp]+"</span>";
  h+='<span style="flex-shrink:0;font-size:9px">'+ST_ICO[en.status]+"</span>";
  h+='<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1">'+en.title+"</span>";
  if(en.recurring)h+='<span style="font-size:8px;flex-shrink:0">\ud83d\udd01</span>';
  if((en.reactions||[]).length>0)h+='<span style="font-size:8px;flex-shrink:0">'+(en.reactions||[]).join("")+"</span>";
  if(cdBadge)h+='<span style="font-size:7px;flex-shrink:0;background:rgba(0,0,0,.15);border-radius:3px;padding:0 3px">'+(du===0?"today":du===1?"tmrw":du+"d")+"</span>";
  h+="</div>";return h;
}

function render(){
  var t=getTheme(),root=document.documentElement;
  root.style.setProperty("--accent",t.ac);root.style.setProperty("--shadow",t.sh);root.style.setProperty("--hover",t.hv);root.style.setProperty("--surf-alt",t.sa);root.style.setProperty("--ctx-hv",t.ctH);root.style.setProperty("--mini-hv",t.mH);
  var din=dims(state.yr,state.mo),today=new Date();
  var isT=function(d){return today.getFullYear()===state.yr&&today.getMonth()===state.mo&&today.getDate()===d};
  var weeks=getWeeks();if(state.mobileWeek>=weeks.length)state.mobileWeek=weeks.length-1;
  var cts=countByStatus(din),ctt=countByType(din);
  var totalEntries=0;STATUSES.forEach(function(s){totalEntries+=cts[s]});
  var weekCts=weeks.map(function(w){return w.reduce(function(s,d){return s+(d?filE(state.yr,state.mo,d).length:0)},0)});

  var o='<div style="min-height:100vh;background:'+t.bg+";color:"+t.tx+';font-family:Inter,Segoe UI,system-ui,sans-serif;transition:all .3s">';
  o+='<div style="max-width:1120px;margin:0 auto;padding:16px">';

  // Header
  o+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">';
  o+='<div><h1 style="margin:0;font-size:clamp(20px,5vw,26px);font-weight:800;color:'+t.ac+'">Jack\'s Content Calendar</h1>';
  o+='<p class="desktop-only" style="margin:2px 0 0;font-size:12px;color:'+t.ts+'">Right-click any day or entry \u2022 Drag to reschedule \u2022 + quick-add</p></div>';
  o+='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">';
  o+='<button class="mobile-only" onclick="toggleSidebar()" style="padding:7px 12px;border-radius:10px;border:1px solid '+t.bd+";background:"+t.sf+";color:"+t.tx+';cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px">\u2630 Menu</button>';
  o+='<button onclick="goToday()" style="padding:7px 12px;border-radius:10px;border:none;background:'+t.ac+';color:#fff;cursor:pointer;font-size:12px;font-weight:600">\ud83d\udcc6 Today</button>';
  if(state.undoStack.length>0)o+='<button onclick="doUndo()" style="padding:7px 12px;border-radius:10px;border:1px solid '+t.bd+";background:"+t.sf+";color:"+t.tx+';cursor:pointer;font-size:12px;font-weight:600">\u21a9\ufe0f Undo</button>';
  o+='<button onclick="toggleDark()" style="padding:7px 14px;border-radius:10px;border:1px solid '+t.bd+";background:"+t.sf+";color:"+t.tx+';cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px">'+(state.dark?"\u2600\ufe0f Light":"\ud83c\udf19 Dark")+"</button></div></div>";

  // Action bar
  o+='<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">';
  o+='<button class="import-btn" onclick="openBulkAdd()" style="padding:7px 14px;border-radius:10px;border:none;background:#10b981;color:#fff;cursor:pointer;font-size:12px;font-weight:600">\ud83d\udccb Bulk Add</button>';
  o+='<button class="import-btn" onclick="openWeeklyBrief()" style="padding:7px 14px;border-radius:10px;border:none;background:#f59e0b;color:#fff;cursor:pointer;font-size:12px;font-weight:600">\ud83d\udcca Weekly Brief</button>';
  if(state.importMsg)o+='<span style="font-size:12px;font-weight:600;color:'+t.ac+'">'+state.importMsg+"</span>";
  o+="</div>";

  // Search & Filter
  o+='<div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center">';
  o+='<input id="searchBox" value="'+state.search.replace(/"/g,"&quot;")+'" oninput="doSearch(this.value)" placeholder="\ud83d\udd0d Search..." style="flex:1 1 140px;padding:7px 12px;border-radius:10px;border:1px solid '+t.bd+";background:"+t.sf+";color:"+t.tx+';font-size:12px;outline:none;min-width:100px"/>';
  o+='<div style="display:flex;gap:3px;flex-wrap:wrap">';
  ["All"].concat(STATUSES).forEach(function(s){var act=state.filterSt===s;o+='<button onclick="setFilter(\''+s+'\')" style="padding:5px 8px;border-radius:8px;border:1px solid '+(act?t.ac:t.bd)+";background:"+(act?t.ac:"transparent")+";color:"+(act?"#fff":t.ts)+';cursor:pointer;font-size:10px;font-weight:600">'+(s==="All"?"All":ST_ICO[s]+" "+s)+"</button>"});
  o+="</div></div>";
  // Type filter
  o+='<div style="display:flex;gap:3px;margin-bottom:14px;flex-wrap:wrap">';
  ["All"].concat(TYPES).forEach(function(tp){var act=state.filterType===tp;o+='<button onclick="setFilterType(\''+tp+'\')" style="padding:5px 8px;border-radius:8px;border:1px solid '+(act?t.ac:t.bd)+";background:"+(act?t.ac:"transparent")+";color:"+(act?"#fff":t.ts)+';cursor:pointer;font-size:10px;font-weight:600">'+(tp==="All"?"All Types":TYPE_ICO[tp]+" "+tp)+"</button>"});
  o+="</div>";

  // Monthly Stats
  o+='<div style="margin-bottom:14px;background:'+t.sf+";border-radius:12px;padding:12px 16px;border:1px solid "+t.bd+'">';
  o+='<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between">';
  o+='<div style="display:flex;align-items:center;gap:6px"><span style="font-size:18px;font-weight:800;color:'+t.ac+'">'+totalEntries+'</span><span style="font-size:11px;font-weight:600;color:'+t.ts+'">Total</span></div>';
  o+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
  STATUSES.forEach(function(s){if(cts[s]>0)o+='<span style="'+stBadgeStyle(s,t)+';padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600">'+ST_ICO[s]+" "+cts[s]+"</span>"});
  o+="</div>";
  o+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
  TYPES.forEach(function(tp){if(ctt[tp]>0){var bg=typeBg(tp,state.dark),tx=typeTx(tp,state.dark);o+='<span style="background:'+bg+";color:"+tx+';padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600">'+TYPE_ICO[tp]+" "+ctt[tp]+"</span>"}});
  if(totalEntries===0)o+='<span style="font-size:11px;color:'+t.ts+'">No entries yet</span>';
  o+="</div></div></div>";

  // Mobile sidebar
  if(state.sidebarOpen){
    o+='<div onclick="toggleSidebar()" style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:900"></div>';

window.triggerDel=function(yr,mo,day,id,title){state.confirmDel={yr:yr,mo:mo,day:day,id:id,title:title};render()};
window.triggerEdit=function(day,id){var k=dk(state.yr,state.mo,day);var en=(state.entries[k]||[]).filter(function(x){return x.id===id})[0];if(en)openModalEdit(day,en)};

// Bulk Add
window.openBulkAdd=function(){
  hideModal();var t=getTheme();
  modOv=document.createElement("div");modOv.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:2000;padding:16px";modOv.onclick=hideModal;
  var b=document.createElement("div");b.style.cssText="background:"+t.sf+";border-radius:16px;padding:24px;width:100%;max-width:440px;box-shadow:0 20px 60px "+t.sh+";border:1px solid "+t.bd+";max-height:90vh;overflow-y:auto";b.onclick=function(e){e.stopPropagation()};
  b.innerHTML='<h3 style="margin:0 0 6px;color:'+t.tx+';font-size:17px">\ud83d\udccb Bulk Add</h3>'
    +'<p style="margin:0 0 14px;font-size:12px;color:'+t.ts+'">One task per line. All share the same day, type, status & recurrence.</p>'
    +'<textarea id="ba_titles" placeholder="Blog: Client A review\nAudit: Client A technical\nOptimisation: Client A landing pages\nUploading: Client A assets" rows="6" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid '+t.bd+";background:"+t.sa+";color:"+t.tx+';font-size:13px;margin-bottom:10px;resize:vertical;outline:none;font-family:inherit;box-sizing:border-box"></textarea>'
    +'<div style="display:flex;gap:10px;margin-bottom:10px">'
    +'<div style="flex:1"><label style="font-size:11px;color:'+t.ts+';display:block;margin-bottom:3px">Day</label><select id="ba_day" style="width:100%;padding:8px;border-radius:8px;border:1px solid '+t.bd+";background:"+t.sa+";color:"+t.tx+';font-size:13px">'+Array.from({length:dims(state.yr,state.mo)},function(_,i){return'<option value="'+(i+1)+'">'+(i+1)+"</option>"}).join("")+"</select></div>"
    +'<div style="flex:1"><label style="font-size:11px;color:'+t.ts+';display:block;margin-bottom:3px">Type</label><select id="ba_tp" style="width:100%;padding:8px;border-radius:8px;border:1px solid '+t.bd+";background:"+t.sa+";color:"+t.tx+';font-size:13px">'+TYPES.map(function(tp){return'<option value="'+tp+'">'+TYPE_ICO[tp]+" "+tp+"</option>"}).join("")+"</select></div></div>"
    +'<div style="display:flex;gap:10px;margin-bottom:10px">'
    +'<div style="flex:1"><label style="font-size:11px;color:'+t.ts+';display:block;margin-bottom:3px">Status</label><select id="ba_st" style="width:100%;padding:8px;border-radius:8px;border:1px solid '+t.bd+";background:"+t.sa+";color:"+t.tx+';font-size:13px">'+STATUSES.map(function(s){return'<option value="'+s+'">'+ST_ICO[s]+" "+s+"</option>"}).join("")+"</select></div>"
    +'<div style="flex:1"><label style="font-size:11px;color:'+t.ts+';display:block;margin-bottom:3px">Recurrence</label><select id="ba_rc" onchange="toggleBaEnd()" style="width:100%;padding:8px;border-radius:8px;border:1px solid '+t.bd+";background:"+t.sa+";color:"+t.tx+';font-size:13px">'+RECUR.map(function(r){return'<option value="'+r+'">'+r+"</option>"}).join("")+"</select></div></div>"
    +'<div id="ba_end_wrap" style="margin-bottom:10px;display:none"><label style="font-size:11px;color:'+t.ts+';display:block;margin-bottom:3px">End Date</label><input id="ba_re" type="date" style="width:100%;padding:8px;border-radius:8px;border:1px solid '+t.bd+";background:"+t.sa+";color:"+t.tx+';font-size:13px;box-sizing:border-box"/></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end">'
    +'<button id="ba_cn" style="padding:9px 18px;border-radius:10px;border:1px solid '+t.bd+";background:transparent;color:"+t.ts+';cursor:pointer;font-size:14px">Cancel</button>'
    +'<button id="ba_sv" style="padding:9px 18px;border-radius:10px;border:none;background:#10b981;color:#fff;cursor:pointer;font-size:14px;font-weight:600">Add All</button></div>';
  modOv.appendChild(b);document.body.appendChild(modOv);
  document.getElementById("ba_cn").onclick=hideModal;
  document.getElementById("ba_sv").onclick=function(){
    var lines=document.getElementById("ba_titles").value.split("\n").map(function(l){return l.trim()}).filter(function(l){return l.length>0});
    if(!lines.length)return;
    var day=parseInt(document.getElementById("ba_day").value),tp=document.getElementById("ba_tp").value,st=document.getElementById("ba_st").value,rc=document.getElementById("ba_rc").value,re=document.getElementById("ba_re")?document.getElementById("ba_re").value||"":"";
    snap();lines.forEach(function(title){var e={id:gid(),title:title,notes:"",entryType:tp,status:st,recurrence:rc,recurEnd:re,reactions:[]};addEntryRaw(state.yr,state.mo,day,e);expandR(state.yr,state.mo,day,e)});

};
window.toggleBaEnd=function(){var rc=document.getElementById("ba_rc").value;var w=document.getElementById("ba_end_wrap");if(w)w.style.display=rc==="None"?"none":"block"};

// Weekly Brief
window.openWeeklyBrief=function(){
  hideModal();var t=getTheme(),today=new Date(),todayDay=today.getDay(),mondayOff=todayDay===0?-6:1-todayDay;
  var monday=new Date(today);monday.setDate(today.getDate()+mondayOff);
  var weekEntries=[];
  for(var i=0;i<7;i++){var d=new Date(monday);d.setDate(monday.getDate()+i);var ents=ge(d.getFullYear(),d.getMonth(),d.getDate());
    ents.forEach(function(en){weekEntries.push({entry:en,date:d,dayName:DAYS_H[i],dayNum:d.getDate(),month:MONTHS_S[d.getMonth()],daysAway:i})})}
  weekEntries.sort(function(a,b){if(a.daysAway!==b.daysAway)return a.daysAway-b.daysAway;return(ST_ORDER[a.entry.status]||9)-(ST_ORDER[b.entry.status]||9)});
  var urgent=weekEntries.filter(function(e){return e.daysAway<=1}),upcoming=weekEntries.filter(function(e){return e.daysAway>1});
  modOv=document.createElement("div");modOv.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:2000;padding:16px";modOv.onclick=hideModal;
  var b=document.createElement("div");b.style.cssText="background:"+t.sf+";border-radius:16px;padding:24px;width:100%;max-width:440px;box-shadow:0 20px 60px "+t.sh+";border:1px solid "+t.bd+";max-height:85vh;overflow-y:auto";b.onclick=function(e){e.stopPropagation()};
  var html='<h3 style="margin:0 0 4px;color:'+t.tx+';font-size:17px">\ud83d\udcca Weekly Brief</h3>';
  html+='<p style="margin:0 0 16px;font-size:12px;color:'+t.ts+'">Week of '+monday.getDate()+" "+MONTHS_S[monday.getMonth()]+" \u2022 "+weekEntries.length+" entries</p>";
  if(!weekEntries.length)html+='<div style="text-align:center;padding:30px 0;color:'+t.ts+'"><div style="font-size:40px;margin-bottom:10px">\ud83c\udf89</div><p>Nothing this week!</p></div>';
  else{
    if(urgent.length>0){
      html+='<div style="background:'+(state.dark?"#3b1818":"#fef2f2")+";border:1px solid "+(state.dark?"#7f1d1d":"#fecaca")+';border-radius:10px;padding:12px;margin-bottom:12px">';
      html+='<div style="font-size:12px;font-weight:700;color:'+(state.dark?"#fca5a5":"#dc2626")+';margin-bottom:8px">\ud83d\udd25 PRIORITY \u2014 Today & Tomorrow ('+urgent.length+")</div>";
      urgent.forEach(function(e){var tp=e.entry.entryType||"Misc";
        html+='<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06)">';
        html+='<span style="font-size:11px">'+TYPE_ICO[tp]+"</span>";
        html+='<span style="'+stBadgeStyle(e.entry.status,t)+';padding:1px 5px;border-radius:4px;font-size:9px;font-weight:600">'+ST_ICO[e.entry.status]+"</span>";
        html+='<span style="font-size:12px;font-weight:600;color:'+t.tx+';flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e.entry.title+"</span>";
        html+='<span style="font-size:10px;color:'+t.ts+'">'+e.dayName+"</span></div>"});
      html+="</div>";}
    if(upcoming.length>0){
      html+='<div style="background:'+t.sa+";border:1px solid "+t.bd+';border-radius:10px;padding:12px">';
      html+='<div style="font-size:12px;font-weight:700;color:'+t.ac+';margin-bottom:8px">\ud83d\udcc5 LATER THIS WEEK ('+upcoming.length+")</div>";
      upcoming.forEach(function(e){var tp=e.entry.entryType||"Misc";
        html+='<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06)">';
        html+='<span style="font-size:11px">'+TYPE_ICO[tp]+"</span>";
        html+='<span style="'+stBadgeStyle(e.entry.status,t)+';padding:1px 5px;border-radius:4px;font-size:9px;font-weight:600">'+ST_ICO[e.entry.status]+"</span>";
        html+='<span style="font-size:12px;font-weight:600;color:'+t.tx+';flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e.entry.title+"</span>";
        html+='<span style="font-size:10px;color:'+t.ts+'">'+e.dayName+"</span></div>"});
      html+="</div>";}}
  html+='<div style="display:flex;justify-content:flex-end;margin-top:14px"><button id="wb_close" style="padding:9px 20px;border-radius:10px;border:none;background:'+t.ac+';color:#fff;cursor:pointer;font-size:14px;font-weight:600">Close</button></div>';
  b.innerHTML=html;modOv.appendChild(b);document.body.appendChild(modOv);
  document.getElementById("wb_close").onclick=hideModal;
};

// Drag
function startDrag(id,fk){state.drag={id:id,fk:fk}}
function endDrag(){state.drag=null}
function doDrop(y,m,d){if(state.drag){moveEntry(state.drag.fk,dk(y,m,d),state.drag.id);state.drag=null}}

// Touch swipe
var touchX=0;
document.addEventListener("touchstart",function(e){touchX=e.touches[0].clientX},{passive:true});
document.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-touchX;if(Math.abs(dx)>60&&isMobile()){if(dx<0)nextWeek();else prevWeek()}},{passive:true});

// Delete confirm
window.confirmDel=function(){if(state.confirmDel){var cd=state.confirmDel;state.confirmDel=null;removeEntry(cd.yr,cd.mo,cd.day,cd.id)}};
window.cancelDel=function(){state.confirmDel=null;render()};

// Navigation
window.toggleSidebar=function(){state.sidebarOpen=!state.sidebarOpen;render()};
window.doUndo=function(){undo()};
window.toggleDark=function(){state.dark=!state.dark;render()};
window.goToday=function(){var d=new Date();state.yr=d.getFullYear();state.mo=d.getMonth();state.mobileWeek=0;var weeks=getWeeks();for(var i=0;i<weeks.length;i++){if(weeks[i].indexOf(d.getDate())>=0){state.mobileWeek=i;break}}render()};
window.prevMo=function(){if(state.mo===0){state.mo=11;state.yr--}else state.mo--;state.mobileWeek=0;render()};
window.nextMo=function(){if(state.mo===11){state.mo=0;state.yr++}else state.mo++;state.mobileWeek=0;render()};
window.goMonth=function(m,y){state.mo=m;state.yr=y;state.mobileWeek=0;state.sidebarOpen=false;render()};
window.goWeek=function(i){state.mobileWeek=i;render()};
window.prevWeek=function(){if(state.mobileWeek>0){state.mobileWeek--;render()}};
window.nextWeek=function(){var w=getWeeks();if(state.mobileWeek<w.length-1){state.mobileWeek++;render()}};
window.doSearch=function(v){state.search=v;render();var el=document.getElementById("searchBox");if(el){el.focus();el.setSelectionRange(v.length,v.length)}};
window.setFilter=function(v){state.filterSt=v;render()};
window.setFilterType=function(v){state.filterType=v;render()};
window.showCtx=showCtx;window.showCtxEntry=showCtxEntry;
window.openModal=openModal;window.hideModal=hideModal;window.openModalEdit=openModalEdit;
window.startDrag=startDrag;window.endDrag=endDrag;window.doDrop=doDrop;
window.addEventListener("resize",render);
render();
})();
</script>
